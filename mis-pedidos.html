<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos — Tienda Deportiva</title>
    <link rel="icon" type="image/svg+xml" href="icon-mis-pedidos.svg">
    <link rel="apple-touch-icon" href="icon-mis-pedidos.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --surface2: #1a1a1a;
            --border: #222;
            --accent: #c8ff00;
            --text: #f0f0f0;
            --muted: #666;
            --pendiente: #f59e0b;
            --enviado: #3b82f6;
            --entregado: #22c55e;
            --cancelado: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            font-variant-numeric: lining-nums tabular-nums;
        }

        /* HEADER */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-logo {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--accent);
            letter-spacing: 3px;
            text-decoration: none;
        }

        .header-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .header-back:hover { color: var(--accent); }

        /* MAIN */
        .main {
            max-width: 700px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* BUSCAR EMAIL */
        #buscar-screen { display: block; }

        .search-hero {
            text-align: center;
            margin-bottom: 48px;
        }

        .search-tag {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--accent);
            background: rgba(200,255,0,0.08);
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 20px;
        }

        .search-hero h1 {
            font-size: 42px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .search-hero p {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.6;
        }

        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
        }

        .search-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 10px;
            display: block;
        }

        .search-input-wrap {
            display: flex;
            gap: 12px;
        }

        .email-input {
            flex: 1;
            padding: 14px 18px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .email-input:focus { border-color: var(--accent); }

        .buscar-btn {
            padding: 14px 24px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .buscar-btn:hover { opacity: 0.85; }

        .search-error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* RESULTADOS */
        #resultados-screen { display: none; }

        .resultados-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .resultados-title {
            font-size: 22px;
            font-weight: 800;
        }

        .resultados-email {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
            font-family: 'Syne', sans-serif;
        }

        .volver-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .volver-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* PEDIDO CARD */
        .pedido-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .pedido-card:hover { border-color: #333; }

        .pedido-card-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            gap: 16px;
        }

        .pedido-card-left { flex: 1; }

        .pedido-num {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .pedido-fecha {
            font-size: 13px;
            color: var(--muted);
        }

        .pedido-total {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            margin-right: 16px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .badge-pendiente { background: rgba(245,158,11,0.15); color: var(--pendiente); }
        .badge-enviado   { background: rgba(59,130,246,0.15);  color: var(--enviado); }
        .badge-entregado { background: rgba(34,197,94,0.15);   color: var(--entregado); }
        .badge-cancelado { background: rgba(239,68,68,0.15);   color: var(--cancelado); }

        .pedido-chevron {
            color: var(--muted);
            transition: transform 0.3s;
            font-size: 14px;
        }

        .pedido-card.open .pedido-chevron { transform: rotate(180deg); }

        .pedido-card-body {
            display: none;
            border-top: 1px solid var(--border);
            padding: 24px;
        }

        .pedido-card.open .pedido-card-body { display: block; }

        /* Timeline de estado */
        .estado-timeline {
            display: flex;
            align-items: center;
            margin-bottom: 28px;
            gap: 0;
        }

        .timeline-step {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .timeline-step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 16px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: var(--border);
            z-index: 0;
        }

        .timeline-step.done:not(:last-child)::after { background: var(--accent); }

        .timeline-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface2);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 13px;
            position: relative;
            z-index: 1;
        }

        .timeline-step.done .timeline-dot {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        .timeline-step.current .timeline-dot {
            border-color: var(--accent);
            color: var(--accent);
        }

        .timeline-label {
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--muted);
        }

        .timeline-step.done .timeline-label,
        .timeline-step.current .timeline-label { color: var(--text); }

        /* Productos */
        .productos-title {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .producto-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--surface2);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .producto-name { font-size: 14px; font-weight: 600; }
        .producto-qty  { font-size: 12px; color: var(--muted); }
        .producto-price {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            color: var(--accent);
        }

        .pedido-totales {
            border-top: 1px solid var(--border);
            padding-top: 16px;
            margin-top: 8px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--muted);
        }

        .total-row.final {
            font-size: 16px;
            font-weight: 800;
            color: var(--accent);
            margin-top: 8px;
        }

        /* LOADING / EMPTY */
        .loading-msg {
            text-align: center;
            padding: 48px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 13px;
        }

        .empty-msg {
            text-align: center;
            padding: 48px;
            color: var(--muted);
        }

        .empty-msg i { font-size: 48px; margin-bottom: 16px; opacity: 0.2; display: block; }

        @media (max-width: 600px) {
            .search-input-wrap { flex-direction: column; }
            .search-hero h1 { font-size: 30px; }
            .pedido-card-header { flex-wrap: wrap; }
            .estado-timeline { gap: 0; }
            .timeline-label { font-size: 9px; }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="https://cxr10s.github.io/tienda/" class="header-logo">STORE.</a>
    <a href="https://cxr10s.github.io/tienda/" class="header-back">
        <i class="fa-solid fa-arrow-left"></i> Volver a la tienda
    </a>
</div>

<div class="main">

    <!-- PANTALLA BUSCAR -->
    <div id="buscar-screen">
        <div class="search-hero">
            <div class="search-tag">MIS PEDIDOS</div>
            <h1>Consulta tu<br>pedido</h1>
            <p>Ingresa el correo con el que realizaste tu compra<br>y verás el estado de todos tus pedidos.</p>
        </div>

        <div class="search-box">
            <label class="search-label">CORREO ELECTRÓNICO</label>
            <div class="search-input-wrap">
                <input
                    class="email-input"
                    type="email"
                    id="email-input"
                    placeholder="tucorreo@gmail.com"
                    autocomplete="email"
                    onkeydown="if(event.key==='Enter') buscarPedidos()">
                <button class="buscar-btn" onclick="buscarPedidos()">
                    <i class="fa-solid fa-magnifying-glass"></i> Buscar
                </button>
            </div>
            <div style="display:flex; align-items:center; gap:12px; margin:16px 0;">
                <div style="flex:1; height:1px; background:#222;"></div>
                <span style="font-size:12px; color:#555; font-family:'Syne',sans-serif;">O</span>
                <div style="flex:1; height:1px; background:#222;"></div>
            </div>
            <label class="search-label">ID DEL PEDIDO (en tu factura)</label>
            <div class="search-input-wrap">
                <input
                    class="email-input"
                    type="text"
                    id="id-input"
                    placeholder="Ej: A1B2C3D4"
                    autocomplete="off"
                    style="font-family:'Space Mono',monospace; text-transform:uppercase;"
                    onkeydown="if(event.key==='Enter') buscarPorId()">
                <button class="buscar-btn" onclick="buscarPorId()" style="background:#1a1a1a; color:#f0f0f0; border:1px solid #333;">
                    <i class="fa-solid fa-hashtag"></i> Buscar
                </button>
            </div>
            <div class="search-error" id="search-error">No encontramos pedidos con ese dato.</div>
        </div>
    </div>

    <!-- PANTALLA RESULTADOS -->
    <div id="resultados-screen">
        <div class="resultados-header">
            <div>
                <div class="resultados-title">Tus pedidos</div>
                <div class="resultados-email" id="email-shown"></div>
            </div>
            <button class="volver-btn" onclick="volverBuscar()">
                <i class="fa-solid fa-arrow-left"></i> Buscar otro
            </button>
        </div>
        <div id="pedidos-list"></div>
    </div>

</div>

<script>
const SUPABASE_URL  = 'https://qvaaistunotxgpyqebya.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2YWFpc3R1bm90eGdweXFlYnlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTk2MzMsImV4cCI6MjA4OTY5NTYzM30.eG62aFEYEtigW7Vb9wJ2VCDK4HVzKCxEredHmVNZXjU';

function fmt(n) {
    return Math.round(Number(n)).toLocaleString('es-CO');
}

// Abrir con email prellenado si viene desde la tienda
window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const email  = params.get('email');
    if (email) {
        document.getElementById('email-input').value = email;
        buscarPedidos();
    }
});

async function buscarPedidos() {
    const email = document.getElementById('email-input').value.trim().toLowerCase();
    const errEl = document.getElementById('search-error');
    errEl.style.display = 'none';

    if (!email) {
        errEl.textContent = 'Por favor ingresa tu correo.';
        errEl.style.display = 'block';
        return;
    }

    document.getElementById('pedidos-list').innerHTML =
        '<div class="loading-msg"><i class="fa-solid fa-spinner fa-spin"></i> Buscando tus pedidos...</div>';
    document.getElementById('buscar-screen').style.display    = 'none';
    document.getElementById('resultados-screen').style.display = 'block';
    document.getElementById('email-shown').textContent = email;

    try {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/pedidos?email=eq.${encodeURIComponent(email)}&order=created_at.desc&select=*`,
            {
                headers: {
                    'apikey': SUPABASE_ANON,
                    'Authorization': `Bearer ${SUPABASE_ANON}`
                }
            }
        );
        const pedidos = await res.json();

        if (!Array.isArray(pedidos) || pedidos.length === 0) {
            document.getElementById('pedidos-list').innerHTML = `
                <div class="empty-msg">
                    <i class="fa-solid fa-box-open"></i>
                    <p>No encontramos pedidos con ese correo.<br>
                    <span style="font-size:12px;">Verifica que sea el mismo correo que usaste al comprar.</span></p>
                </div>`;
            return;
        }

        pedidosCache = pedidos;
        document.getElementById('pedidos-list').innerHTML =
            pedidos.map((p, i) => renderPedido(p, i === 0)).join('');

    } catch (e) {
        document.getElementById('pedidos-list').innerHTML =
            '<div class="loading-msg">❌ Error al buscar. Intenta de nuevo.</div>';
    }
}

function volverBuscar() {
    document.getElementById('buscar-screen').style.display     = 'block';
    document.getElementById('resultados-screen').style.display = 'none';
    document.getElementById('search-error').style.display      = 'none';
}

function toggleCard(id) {
    const card = document.getElementById('card-' + id);
    card.classList.toggle('open');
}

// Timeline según estado
function getTimeline(estado) {
    const pasos = [
        { key: 'pendiente',  icon: '🕐', label: 'RECIBIDO' },
        { key: 'enviado',    icon: '🚚', label: 'ENVIADO' },
        { key: 'entregado',  icon: '✅', label: 'ENTREGADO' },
    ];

    const orden = { pendiente: 0, enviado: 1, entregado: 2, cancelado: -1 };
    const actual = orden[estado] ?? 0;

    if (estado === 'cancelado') {
        return `<div style="text-align:center; padding:16px; color:var(--cancelado); font-weight:700; font-size:13px; letter-spacing:2px;">
            ❌ PEDIDO CANCELADO
        </div>`;
    }

    return `<div class="estado-timeline">
        ${pasos.map((paso, i) => {
            const done    = i < actual;
            const current = i === actual;
            return `<div class="timeline-step ${done ? 'done' : ''} ${current ? 'current' : ''}">
                <div class="timeline-dot">${paso.icon}</div>
                <div class="timeline-label">${paso.label}</div>
            </div>`;
        }).join('')}
    </div>`;
}

function renderPedido(p, abierto) {
    const fecha = new Date(p.created_at).toLocaleDateString('es-CO', {
        day: '2-digit', month: 'long', year: 'numeric'
    });
    const productos = Array.isArray(p.productos) ? p.productos : [];

    const productosHTML = productos.map(prod => `
        <div class="producto-row">
            <div>
                <div class="producto-name">${prod.name}${prod.isGift ? ' 🎁' : ''}</div>
                <div class="producto-qty">Cantidad: ${prod.quantity}</div>
            </div>
            <div class="producto-price">
                ${prod.isGift ? 'GRATIS' : '$' + fmt(prod.price * prod.quantity) + ' COP'}
            </div>
        </div>`).join('');

    const idCorto = p.id.substring(0, 8).toUpperCase();

    return `
    <div class="pedido-card ${abierto ? 'open' : ''}" id="card-${p.id}">
        <div class="pedido-card-header" onclick="toggleCard('${p.id}')">
            <div class="pedido-card-left">
                <div class="pedido-num">Pedido #${idCorto}</div>
                <div class="pedido-fecha">${fecha}</div>
            </div>
            <div class="pedido-total">$${fmt(p.total)} COP</div>
            <span class="badge badge-${p.estado}">${p.estado.toUpperCase()}</span>
            <i class="fa-solid fa-chevron-down pedido-chevron"></i>
        </div>
        <div class="pedido-card-body">
            ${getTimeline(p.estado)}
            <div class="productos-title">PRODUCTOS</div>
            ${productosHTML}
            <div class="pedido-totales">
                <div class="total-row"><span>Subtotal</span><span>$${fmt(p.subtotal)} COP</span></div>
                ${p.descuento > 0 ? `<div class="total-row" style="color:var(--entregado);"><span>Descuento</span><span>-$${fmt(p.descuento)} COP</span></div>` : ''}
                <div class="total-row"><span>Envío</span><span>${p.envio > 0 ? '$' + fmt(p.envio) + ' COP' : '¡Gratis!'}</span></div>
                <div class="total-row final"><span>TOTAL</span><span>$${fmt(p.total)} COP</span></div>
            </div>
            <button data-pedido-id="${p.id}" onclick="descargarFactura(this)" style="
                width:100%; margin-top:16px; padding:12px;
                background:#111; border:1px solid #333; border-radius:12px;
                color:#f0f0f0; font-family:'Syne',sans-serif; font-size:14px;
                font-weight:700; cursor:pointer; transition:border-color 0.2s;"
                onmouseover="this.style.borderColor='#c8ff00'"
                onmouseout="this.style.borderColor='#333'">
                📄 Descargar Factura
            </button>
        </div>
    </div>`;
}

// Cache de pedidos cargados
let pedidosCache = [];

function descargarFactura(btn) {
    const id = btn.getAttribute('data-pedido-id');
    const pedido = pedidosCache.find(p => p.id === id);
    if (pedido) {
        generarFacturaPDF(pedido);
    } else {
        alert('No se pudo encontrar el pedido. Intenta de nuevo.');
    }
}

async function buscarPorId() {
    const rawId = document.getElementById('id-input').value.trim().toUpperCase();
    const errEl = document.getElementById('search-error');
    errEl.style.display = 'none';

    if (!rawId) {
        errEl.textContent = 'Por favor ingresa el ID del pedido.';
        errEl.style.display = 'block';
        return;
    }

    document.getElementById('pedidos-list').innerHTML =
        '<div class="loading-msg"><i class="fa-solid fa-spinner fa-spin"></i> Buscando tu pedido...</div>';
    document.getElementById('buscar-screen').style.display    = 'none';
    document.getElementById('resultados-screen').style.display = 'block';
    document.getElementById('email-shown').textContent = 'ID: ' + rawId;

    try {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/pedidos?order=created_at.desc&select=*`,
            { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } }
        );
        const todos = await res.json();
        const pedidos = todos.filter(p => p.id.substring(0,8).toUpperCase() === rawId);

        if (!pedidos || pedidos.length === 0) {
            document.getElementById('pedidos-list').innerHTML = `
                <div class="empty-msg">
                    <i class="fa-solid fa-box-open"></i>
                    <p>No encontramos un pedido con ese ID.<br>
                    <span style="font-size:12px;">Verifica el ID en tu factura descargada.</span></p>
                </div>`;
            return;
        }
        pedidosCache = pedidos;
        document.getElementById('pedidos-list').innerHTML =
            pedidos.map((p, i) => renderPedido(p, i === 0)).join('');
    } catch (e) {
        document.getElementById('pedidos-list').innerHTML =
            '<div class="loading-msg">❌ Error al buscar. Intenta de nuevo.</div>';
    }
}
</script>
<script src="factura.js"></script>
</body>
</html>
